<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a12">
  <meta name="description" content="STANY PAIRING WEBSITE - Premium WhatsApp Bot Pairing Platform">
  
  <!-- Open Graph / Link Preview -->
  <meta property="og:title" content="STANY PAIRING WEBSITE">
  <meta property="og:description" content="Premium WhatsApp Bot Pairing Platform by STANY TZ">
  <meta property="og:image" content="https://raw.githubusercontent.com/Official123-12/STANYFREEBOT-/refs/heads/main/IMG_1377.jpeg">
  <meta property="og:url" content="https://stany-pairing.vercel.app">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  
  <title>STANY PAIRING WEBSITE • Premium Pair Code</title>
  
  <!-- Font Awesome ONLY -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0a12;
      --surface: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --neon: #00ff88;
      --neon2: #00cfff;
      --accent: #a259ff;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.5);
      --danger: rgba(255,80,80,0.9);
      --glass: blur(20px) saturate(180%);
    }

    html { width: 100%; min-height: 100%; scroll-behavior: smooth; }

    body {
      background: var(--bg) url('https://raw.githubusercontent.com/Official123-12/STANYFREEBOT-/refs/heads/main/IMG_1377.jpeg') center/cover fixed;
      background-blend-mode: overlay;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      line-height: 1.5;
    }

    /* Overlay for readability */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(10,10,18,0.7) 0%, rgba(10,10,18,0.95) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 2;
      opacity: 0.6;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,255,136,0.15), transparent 70%);
      top: -150px; left: -100px;
      animation: drift1 20s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(0,207,255,0.12), transparent 70%);
      bottom: -100px; right: -80px;
      animation: drift2 24s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(162,89,255,0.1), transparent 70%);
      top: 40%; left: 50%;
      transform: translate(-50%, -50%);
      animation: drift3 18s ease-in-out infinite alternate;
    }

    @keyframes drift1 { to { transform: translate(80px, 60px); } }
    @keyframes drift2 { to { transform: translate(-60px, -80px); } }
    @keyframes drift3 { to { transform: translate(-50%, -50%) scale(1.3); } }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(40px, 8vh, 70px) clamp(20px, 5vw, 40px);
      width: 100%;
      max-width: 580px;
    }

    /* Brand Header */
    .brand {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeUp 0.7s ease both;
    }

    .brand-logo {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      object-fit: cover;
      border: 2px solid var(--neon);
      box-shadow: 0 0 30px rgba(0,255,136,0.3);
      margin-bottom: 16px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0,255,136,0.3); }
      50% { box-shadow: 0 0 50px rgba(0,255,136,0.6); }
    }

    .brand-name {
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .brand-name .accent {
      background: linear-gradient(135deg, var(--neon), var(--neon2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-sub {
      font-size: clamp(11px, 2.5vw, 13px);
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 8px;
      font-weight: 500;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon2), var(--neon), var(--neon2), transparent);
      margin: 24px auto;
      border-radius: 2px;
      animation: shimmer 2s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(28px, 5vw, 40px);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      animation: fadeUp 0.7s ease both 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title i { color: var(--neon); }

    .card-hint {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      flex: 1;
    }

    /* Removed .input-prefix - now full number input */
    .phone-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: all 0.25s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .phone-input::placeholder { color: rgba(255,255,255,0.25); }

    .phone-input:focus {
      border-color: var(--neon2);
      background: rgba(0,207,255,0.08);
      box-shadow: 0 0 0 4px rgba(0,207,255,0.15);
    }

    .phone-input.error {
      border-color: var(--danger);
      background: rgba(255,80,80,0.08);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .submit-btn {
      padding: 16px 24px;
      background: linear-gradient(135deg, rgba(0,207,255,0.2), rgba(0,207,255,0.1));
      border: 1px solid rgba(0,207,255,0.4);
      border-radius: 16px;
      color: var(--neon2);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .submit-btn:hover:not(:disabled) {
      background: rgba(0,207,255,0.25);
      border-color: var(--neon2);
      box-shadow: 0 0 28px rgba(0,207,255,0.2);
      transform: translateY(-2px);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

    /* ── STATUS AREA ── */
    .status {
      margin-top: 20px;
      min-height: 44px;
    }

    .status-msg {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.3s ease;
    }

    .status-msg.error { color: var(--danger); }
    .status-msg.success { color: var(--neon); }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,207,255,0.2);
      border-top-color: var(--neon2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CODE BOX ── */
    .code-box {
      margin-top: 24px;
      background: rgba(0,255,136,0.06);
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      animation: fadeUp 0.4s ease both;
    }

    .code-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .code-value {
      font-size: clamp(24px, 7vw, 36px);
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--neon);
      margin-bottom: 18px;
      word-break: break-all;
      font-family: monospace;
      text-shadow: 0 0 20px rgba(0,255,136,0.4);
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.3);
      border-radius: 100px;
      color: var(--neon);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .copy-btn:hover {
      background: rgba(0,255,136,0.2);
      border-color: var(--neon);
      box-shadow: 0 0 24px rgba(0,255,136,0.15);
    }

    .copy-btn.copied {
      color: #fff;
      background: rgba(0,255,136,0.3);
      border-color: var(--neon);
    }

    /* ── SOCIAL LINKS ── */
    .social-links {
      display: flex;
      gap: 12px;
      margin: 28px 0 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(37,211,102,0.12);
      border: 1px solid rgba(37,211,102,0.3);
      border-radius: 14px;
      color: #25d366;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .social-btn i { font-size: 16px; }

    .social-btn:hover {
      background: rgba(37,211,102,0.25);
      border-color: #25d366;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(37,211,102,0.2);
    }

    .social-btn.group {
      background: rgba(0,172,237,0.12);
      border-color: rgba(0,172,237,0.3);
      color: #00acee;
    }
    .social-btn.group:hover {
      background: rgba(0,172,237,0.25);
      border-color: #00acee;
      box-shadow: 0 6px 24px rgba(0,172,237,0.2);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      width: 100%;
      animation: fadeUp 0.7s ease both 0.3s;
    }

    .developer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .developer a {
      color: var(--neon2);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .developer a:hover { color: var(--neon); }

    .copyright {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }

    /* ── BACK LINK ── */
    .back-link {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      animation: fadeUp 0.6s ease both 0.4s;
    }
    .back-link:hover { color: var(--muted); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .submit-btn { width: 100%; justify-content: center; }
      .social-links { flex-direction: column; align-items: center; }
      .social-btn { width: 100%; justify-content: center; }
      .card { padding: 24px 18px; }
    }

    /* ── ACCESSIBILITY ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }

    /* Focus visible for keyboard nav */
    :focus-visible {
      outline: 2px solid var(--neon2);
      outline-offset: 2px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Animated Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="wrapper">
    
    <!-- Brand -->
    <div class="brand">
      <img src="https://raw.githubusercontent.com/Official123-12/STANYFREEBOT-/refs/heads/main/IMG_1377.jpeg" 
           alt="STANY TZ Logo" 
           class="brand-logo"
           loading="eager">
      <div class="brand-name">STANY<span class="accent"> TZ</span></div>
      <div class="brand-sub">Premium Pairing Platform</div>
    </div>

    <div class="divider"></div>

    <!-- Main Card -->
    <div class="card" role="region" aria-label="Pair your WhatsApp device">
      <div class="card-title">
        <i class="fa-solid fa-link"></i> Link Your Device
      </div>
      <div class="card-hint">
        Enter your full phone number with country code<br>
        <strong>Examples:</strong> 255618xxxxxx (TZ), 254712345678 (KE), 919876543210 (IN)
      </div>

      <div class="input-row">
        <div class="input-wrap">
          <input
            class="phone-input"
            id="number"
            type="tel"
            inputmode="numeric"
            pattern="[0-9]{10,15}"
            placeholder="e.g., 255618123456"
            autocomplete="tel"
            aria-label="Phone number with country code"
            maxlength="15"
          >
        </div>
        <button class="submit-btn" id="submit" aria-label="Get pairing code">
          <i class="fa-solid fa-bolt"></i> Get Code
        </button>
      </div>

      <div class="status" id="status" aria-live="polite"></div>
      <div id="code-area" aria-live="assertive"></div>

      <!-- Social Links -->
      <div class="social-links">
        <a href="https://whatsapp.com/channel/0029Vb7fzu4EwEjmsD4Tzs1p" 
           class="social-btn" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Join our WhatsApp Channel">
          <i class="fa-brands fa-whatsapp"></i> Channel
        </a>
        <a href="https://chat.whatsapp.com/J19JASXoaK0GVSoRvShr4Y?mode=gi_t" 
           class="social-btn group" 
           target="_blank" 
           rel="noopener noreferrer"
           aria-label="Join our WhatsApp Group">
          <i class="fa-solid fa-users"></i> Group
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="developer">
        <i class="fa-solid fa-code"></i>
        Developed by 
        <a href="tel:+255787069580" aria-label="Contact developer at +255 787 069 580">
          +255 787 069 580
        </a>
      </div>
      <div class="copyright">
        &copy; <span id="year"></span> STANY PAIRING WEBSITE • All Rights Reserved
      </div>
    </div>

    <a class="back-link" href="/" aria-label="Go back to home page">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <!-- Axios for API calls -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.8/axios.min.js" integrity="sha512-PJa3oQSLWRB7wHZ7GQ/g+qyv6r4mbuhmiDb8BjSFZ8NZ2a42oTtAq5n0ucWAwcQDlikAtkub+tPVCw4np27WCg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  
  <script>
    // Disable right-click globally
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    // Disable keyboard shortcuts for dev tools (basic)
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });

    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();

    // DOM Elements
    const numInput = document.getElementById('number');
    const submitBtn = document.getElementById('submit');
    const statusEl = document.getElementById('status');
    const codeArea = document.getElementById('code-area');

    // Status message handler
    function setStatus(msg, type = '') {
      const icons = { loading: '<div class="spinner"></div>', error: '<i class="fa-solid fa-circle-xmark"></i>', success: '<i class="fa-solid fa-circle-check"></i>' };
      statusEl.innerHTML = msg ? `<div class="status-msg ${type}">${icons[type] || ''}<span>${msg}</span></div>` : '';
    }

    // Show pairing code with copy functionality
    function showCode(code) {
      codeArea.innerHTML = `
        <div class="code-box">
          <div class="code-label"><i class="fa-solid fa-key"></i> Your Pair Code</div>
          <div class="code-value" id="code-val" aria-label="Pairing code: ${code}">${code}</div>
          <button class="copy-btn" id="copy-btn" aria-label="Copy pairing code">
            <i class="fa-regular fa-copy"></i> Copy Code
          </button>
        </div>`;

      document.getElementById('copy-btn')?.addEventListener('click', async () => {
        const btn = document.getElementById('copy-btn');
        const val = document.getElementById('code-val')?.innerText;
        if (!val) return;
        try {
          await navigator.clipboard.writeText(val);
          btn.classList.add('copied');
          btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<i class="fa-regular fa-copy"></i> Copy Code`;
          }, 2200);
        } catch (e) {
          // Fallback for older browsers
          const ta = document.createElement('textarea');
          ta.value = val;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.classList.add('copied');
          btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = `<i class="fa-regular fa-copy"></i> Copy Code`;
          }, 2200);
        }
      });
    }

    // Submit handler – REAL BACKEND CALL (no simulation)
    submitBtn.addEventListener('click', async () => {
      const raw = numInput.value.replace(/\D/g, '');
      codeArea.innerHTML = '';
      numInput.classList.remove('error');

      if (!raw || raw.length < 7 || raw.length > 15) { // Basic validation for any country
        numInput.classList.add('error');
        setStatus('Please enter a valid phone number (7-15 digits with country code)', 'error');
        numInput.focus();
        return;
      }

      submitBtn.disabled = true;
      setStatus('Requesting pair code…', 'loading');

      try {
        // Real API endpoint – matches backend /code route with full number
        const { data } = await axios.get(`/code?number=${raw}`);
        
        // Extract code from response (supports both 'code' and 'pairCode' fields)
        const pairCode = data?.code || data?.pairCode;
        
        if (pairCode) {
          setStatus('Pair code generated successfully!', 'success');
          showCode(pairCode);
        } else {
          throw new Error(data?.message || 'Invalid response from server');
        }
      } catch (err) {
        console.error('Pairing error:', err);
        // Display error message from server if available
        const errorMsg = err.response?.data?.message || err.message || 'Failed to get pair code. Please try again.';
        setStatus(errorMsg, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    // Enter key support
    numInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });
    
    // Clear error on input
    numInput.addEventListener('input', () => {
      numInput.classList.remove('error');
      if (statusEl.querySelector('.error')) setStatus('');
    });
  </script>
</body>
</html>
