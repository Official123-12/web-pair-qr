      pointer-events: none;

      bottom: 0; left: 0; right: 0;

      background: var(--card-glow, var(--neon));
      opacity: 0;

    /* ── ACCESSIBILITY ── */
    @media (prefers-reduced-motion: reduce) {

  <script>
    // ── SECURITY: Disable right-click & dev tools shortcuts ──
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || 
          (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) || 
          (e.ctrlKey && e.key === 'u') ||
          (e.metaKey && e.key === 'u')) {
        e.preventDefault();
        return false;
      }
    });

    // Set current year
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── CANVAS PARTICLES (Optimized for performance) ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, nodes = [], animId, lastTime = 0;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.width = window.innerWidth * dpr;
      H = canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
      initNodes();
    }

    function initNodes() {
      nodes = [];
      const isMobile = window.innerWidth < 768;
      const count = Math.min(Math.floor((window.innerWidth * window.innerHeight) / (isMobile ? 25000 : 16000)), isMobile ? 25 : 65);
      
      for (let i = 0; i < count; i++) {
        nodes.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * (isMobile ? 0.15 : 0.25),
          vy: (Math.random() - 0.5) * (isMobile ? 0.15 : 0.25),
          r: Math.random() * (isMobile ? 1.2 : 1.5) + 0.5,
          opacity: Math.random() * 0.3 + 0.1
        });
      }
    }

    function draw(timestamp) {
      const isMobile = window.innerWidth < 768;
      if (isMobile && timestamp - lastTime < 33) {
        animId = requestAnimationFrame(draw);
        return;
      }
      lastTime = timestamp;

      const width = window.innerWidth;
      const height = window.innerHeight;
      ctx.clearRect(0, 0, width, height);

      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        a.x += a.vx; a.y += a.vy;
        
        if (a.x < 0 || a.x > width) a.vx *= -1;
        if (a.y < 0 || a.y > height) a.vy *= -1;
        
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.hypot(dx, dy);
          if (dist < 140) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(0,207,255,${(1 - dist/140) * (isMobile ? 0.06 : 0.11)})`;
            ctx.lineWidth = isMobile ? 0.3 : 0.5;
            ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
        
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,207,255,${a.opacity})`;
        ctx.fill();
      }
      animId = requestAnimationFrame(draw);
    }

    // Efficient resize handler
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        cancelAnimationFrame(animId);
        resize();
        draw(0);
      }, 150);
    });

    // Initialize
    resize();
    draw(0);

    // Pause animation when tab hidden (battery saver)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        cancelAnimationFrame(animId);
      } else {
        lastTime = 0;
        draw(0);
      }
    });
  </script>
</body>
</html>
